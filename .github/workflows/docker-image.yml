name: Docker image

on:
  push:
    branches:
      - develop
      - master
    paths:
      - .github/workflows/docker-image.yml
      - docker/Dockerfile
      - .version
      - backend/package.json
      - backend/package-lock.json
      - frontend/package.json
      - frontend/package-lock.json
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:
    inputs:
      push:
        description: Push image to Docker Hub
        type: boolean
        default: true
      skip_frontend_tests:
        description: Skip frontend lint and vitest
        type: boolean
        default: false

concurrency:
  group: docker-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  IMAGE: docker.io/salexson/nginx-proxy-manager
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Build via host Podman socket (podman --remote). The in-runner `docker` CLI is a shim and
  # cannot build images here (rootless newuidmap). Images still push to Docker Hub.
  BUILDAH_ISOLATION: chroot

jobs:
  build:
    # Infisical vault is internal; gen runners reach it and expose Docker via DOCKER_HOST.
    runs-on: [self-hosted, linux, gen]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Docker Hub credentials from Infisical (OIDC)
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.push)
        uses: ./.github/actions/infisical-oidc-load
        with:
          secret_path: /Docker
          recursive: "false"
          secret_keys: docker.io-user,docker.io-token

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check registry connectivity
        run: |
          set -euo pipefail
          if ! curl -fsSL --connect-timeout 15 --max-time 60 -o /dev/null https://registry.npmjs.org; then
            echo "::error::Cannot reach https://registry.npmjs.org from the runner — npm ci will fail. Check host/container egress and DNS."
            exit 1
          fi
          echo "OK: https://registry.npmjs.org"

      - name: Verify Node.js version (> 20)
        run: |
          set -euo pipefail
          node --version
          major="$(node -p "Number(process.versions.node.split('.')[0])")"
          if [ "$major" -le 20 ]; then
            echo "::error::Node.js > 20 required (got $(node --version))"
            exit 1
          fi

      - name: Build documentation (VitePress)
        working-directory: docs
        run: |
          set -euo pipefail
          npm ci 2>/dev/null || npm install
          npm run build

      - name: Build frontend
        working-directory: frontend
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          CI: true
        run: |
          set -euo pipefail
          npm_ci() {
            npm ci --prefer-offline "$@" || npm ci "$@"
          }
          attempt=1
          max_attempts=5
          until npm_ci; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::npm ci failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "::warning::npm ci failed (attempt ${attempt}/${max_attempts}); retrying in 30s..."
            attempt=$((attempt + 1))
            sleep 30
          done
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run lint
            npm run locale-compile
            npm run test -- run --no-color
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_frontend_tests }}" != "true" ]; then
            npm run lint
            npm run locale-compile
            npm run test -- run --no-color
          else
            npm run locale-compile
          fi
          npm run build
          rm -rf dist/docs
          mkdir -p dist/docs
          cp -a ../docs/dist/. dist/docs/

      - name: Set build metadata
        id: buildmeta
        run: |
          set -euo pipefail
          echo "date=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"
          # Image label only — fork does not publish upstream semver tags to Docker Hub.
          ver="$(tr -d ' \n\r' < .version)"
          echo "version=v${ver}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}

      - name: Build image on host Podman
        run: |
          set -euo pipefail
          echo "CONTAINER_HOST=${CONTAINER_HOST:-}"
          echo "DOCKER_HOST=${DOCKER_HOST:-}"
          podman --remote version
          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && tag_args+=(-t "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"
          podman --remote build \
            --pull \
            --security-opt label=disable \
            "${tag_args[@]}" \
            -f docker/Dockerfile \
            --build-arg TARGETPLATFORM=linux/amd64 \
            --build-arg BUILDPLATFORM=linux/amd64 \
            --build-arg BUILD_VERSION="${{ steps.buildmeta.outputs.version }}" \
            --build-arg BUILD_COMMIT="${{ github.sha }}" \
            --build-arg BUILD_DATE="${{ steps.buildmeta.outputs.date }}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            .
          podman --remote images | grep nginx-proxy-manager || true

      - name: Log in to Docker Hub
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.push)
        run: |
          set -euo pipefail
          if [ -z "${DOCKER_IO_USER:-}" ] || [ -z "${DOCKER_IO_TOKEN:-}" ]; then
            echo "::error::DOCKER_IO_USER and DOCKER_IO_TOKEN must be set (Infisical /Docker)."
            exit 1
          fi
          printf '%s' "$DOCKER_IO_TOKEN" | podman --remote login docker.io \
            --username "$DOCKER_IO_USER" \
            --password-stdin

      - name: Push image to Docker Hub
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.push)
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && podman --remote push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Logout from Docker Hub
        if: always()
        run: podman --remote logout docker.io || true

      - name: Build summary
        if: always()
        run: |
          echo "## Image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ env.IMAGE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Platform: linux/amd64 — built with podman --remote on host, pushed to Docker Hub._"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_PR builds are not pushed to Docker Hub._" >> "$GITHUB_STEP_SUMMARY"
          fi
