# ----------------------------------------------------------------------
# {{ domain_names | join: ", " }}
# DO NOT EDIT THIS FILE DIRECTLY, CHANGES WILL BE LOST WHEN UPDATING!
# ----------------------------------------------------------------------
{% assign forward_host_last_char = forward_host | slice: -1 -%}

{% if enabled %}
  {{ upstreams }}

  server {
    {% include "_common.conf" %}

    {% if access_list_id > 0 %}
      {% if access_list.items.length > 0 %}
        # Authorization
        auth_basic            "basic access authentication required";
        auth_basic_user_file  /data/access/{{ access_list_id }};
        {% if access_list.pass_auth %}
          proxy_set_header Authorization "";
        {% endif %}
      {% endif %}
      # Access Rules: {{ access_list.clients | size }} total
      {% for client in access_list.clients %}
        {{ client | nginxAccessRule }}
      {% endfor %}
      deny all;
      # Access checks must...
      {% if access_list.satisfy_any %}
        satisfy any;
      {% else %}
        satisfy all;
      {% endif %}
    {% endif %}

    location / {
      {{ npmplus_location_config }}

      {% if npmplus_noindex == true %}include noindex-nofollow.conf;{% endif %}
      {% if npmplus_crowdsec_appsec == true %}set $crowdsec_disable_appsec 1;{% endif %}

      {% if npmplus_x_frame_options == "upstream" %}
      {% elsif npmplus_x_frame_options == "none" %}
         more_clear_headers "X-Frame-Options";
      {% elsif npmplus_x_frame_options == "DENY" %}
         more_set_headers "X-Frame-Options: DENY";
      {% else %}
         more_set_headers "X-Frame-Options: SAMEORIGIN";
      {% endif %}

      {% if forward_scheme == "http" or forward_scheme == "https" %}

        include proxy-headers.conf;
        {% if npmplus_upstream_compression != true %}proxy_set_header Accept-Encoding "";{% endif %}
        {% if npmplus_proxy_request_buffering == true and npmplus_crowdsec_appsec == true %}proxy_request_buffering off;{% endif %}
        {% if npmplus_proxy_response_buffering == true %}proxy_buffering off;{% endif %}
        proxy_pass {{ forward_scheme }}://{{ forward_upstream_name }}{% if forward_path != null %}{{ forward_path }}{% else %}$request_uri{% endif %};

      {% elsif forward_scheme == "grpc" or forward_scheme == "grpcs" %}

        include grpc-headers.conf;
        {% if npmplus_upstream_compression != true %}grpc_set_header Accept-Encoding "";{% endif %}
        grpc_pass {{ forward_scheme }}://{{ forward_upstream_name }}{% if forward_path != null %}{{ forward_path }}{% else %}$request_uri{% endif %};

      {% elsif forward_scheme == "path" %}

        {% if forward_host_last_char == "/" %}
          alias {{ forward_host }};
        {% else %}
          root {{ forward_host }};
        {% endif %}

        {% if npmplus_fancyindex == true %}fancyindex on;{% endif %}

        {% if forward_path != null %}
          location ~* [^/]\.php(?:$|/) {
            fastcgi_split_path_info ^(.*\.php)(/.*)$;
            try_files $fastcgi_script_name =404;
            fastcgi_pass unix:/run/php{{ forward_port }}.sock;
          }
        {% endif %}

      {% endif %}

      {% if npmplus_auth_request == "anubis" %}
        auth_request /.within.website/x/cmd/anubis/api/check;
        error_page 401 403 =200 /.within.website?redir=$request_uri;
      {% endif %}

      {% if npmplus_auth_request == "tinyauth" %}
        auth_request /tinyauth;
        error_page 401 = @tinyauth_login;

        auth_request_set $tinyauth_remote_user $upstream_http_remote_user;
        auth_request_set $tinyauth_remote_email $upstream_http_remote_email;
        auth_request_set $tinyauth_remote_name $upstream_http_remote_name;
        auth_request_set $tinyauth_remote_groups $upstream_http_remote_groups;
        proxy_set_header Remote-User $tinyauth_remote_user;
        proxy_set_header Remote-Email $tinyauth_remote_email;
        proxy_set_header Remote-Name $tinyauth_remote_name;
        proxy_set_header Remote-Groups $tinyauth_remote_groups;
      {% endif %}

      {% if npmplus_auth_request == "oauth2proxy" %}
        auth_request /oauth2/auth;
        error_page 401 = @oauth2_signin;

        auth_request_set $user $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        proxy_set_header X-User $user;
        proxy_set_header X-Email $email;

        auth_request_set $token  $upstream_http_x_auth_request_access_token;
        proxy_set_header X-Access-Token $token;

        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;

        auth_request_set $auth_cookie_name_upstream_1 $upstream_cookie_auth_cookie_name_1;
        if ($auth_cookie ~* "(; .*)") {
            set $auth_cookie_name_0 $auth_cookie;
            set $auth_cookie_name_1 "auth_cookie_name_1=$auth_cookie_name_upstream_1$1";
        }
        if ($auth_cookie_name_upstream_1) {
            add_header Set-Cookie $auth_cookie_name_0;
            add_header Set-Cookie $auth_cookie_name_1;
        }
      {% endif %}

      {% if npmplus_auth_request == "authelia" %}
        auth_request /internal/authelia/authz;
        auth_request_set $redirection_url $upstream_http_location;
        error_page 401 =302 $redirection_url;

        auth_request_set $user $upstream_http_remote_user;
        auth_request_set $groups $upstream_http_remote_groups;
        auth_request_set $name $upstream_http_remote_name;
        auth_request_set $email $upstream_http_remote_email;
        proxy_set_header Remote-User $user;
        proxy_set_header Remote-Groups $groups;
        proxy_set_header Remote-Email $email;
        proxy_set_header Remote-Name $name;
      {% endif %}

      {% if npmplus_auth_request == "authentik" or npmplus_auth_request == "authentik-send-basic-auth" %}
        auth_request /outpost.goauthentik.io/auth/nginx;
        error_page 401 = @goauthentik_proxy_signin;

        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;

        auth_request_set $authentik_username $upstream_http_x_authentik_username;
        auth_request_set $authentik_groups $upstream_http_x_authentik_groups;
        auth_request_set $authentik_entitlements $upstream_http_x_authentik_entitlements;
        auth_request_set $authentik_email $upstream_http_x_authentik_email;
        auth_request_set $authentik_name $upstream_http_x_authentik_name;
        auth_request_set $authentik_uid $upstream_http_x_authentik_uid;
        proxy_set_header X-authentik-username $authentik_username;
        proxy_set_header X-authentik-groups $authentik_groups;
        proxy_set_header X-authentik-entitlements $authentik_entitlements;
        proxy_set_header X-authentik-email $authentik_email;
        proxy_set_header X-authentik-name $authentik_name;
        proxy_set_header X-authentik-uid $authentik_uid;

        {% if npmplus_auth_request == "authentik-send-basic-auth" %}
          auth_request_set $authentik_auth $upstream_http_authorization;
          proxy_set_header Authorization $authentik_auth;
        {% endif %}
      {% endif %}
    }

    {% if npmplus_auth_request == "anubis" or create_anubis_locations %}
      location /.within.website {
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        set $anubis_upstream {{ env.AUTH_REQUEST_ANUBIS_UPSTREAM }};
        include proxy-headers.conf;
        proxy_set_header Accept-Encoding "";
        proxy_pass $anubis_upstream$request_uri;
        proxy_method GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
      }
      {% if env.AUTH_REQUEST_ANUBIS_USE_CUSTOM_IMAGES == "true" %}
        location /.within.website/x/cmd/anubis/static/img {
          alias /data/anubis/;
        }
      {% endif %}
    {% endif %}

    {% if npmplus_auth_request == "tinyauth" or create_tinyauth_locations %}
      location /tinyauth {
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        include proxy-headers.conf;
        proxy_set_header Accept-Encoding "";
        proxy_pass {{ env.AUTH_REQUEST_TINYAUTH_UPSTREAM }}/api/auth/nginx;
        internal;
        proxy_method GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Forwarded-URI $request_uri;
      }
      location @tinyauth_login {
        internal;
        return 302 https://{{ env.AUTH_REQUEST_TINYAUTH_DOMAIN }}/login?redirect_uri=$scheme://$host$is_request_port$request_port$request_uri;
      }
    {% endif %}

    {% if npmplus_auth_request == "oauth2proxy" or create_oauth2proxy_locations %}
      location /oauth2 {
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        include proxy-headers.conf;
        proxy_set_header Accept-Encoding "";
        proxy_pass {{ env.AUTH_REQUEST_OAUTH2PROXY_UPSTREAM }}$request_uri;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
      }
      location /oauth2/auth {
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        include proxy-headers.conf;
        proxy_set_header Accept-Encoding "";
        proxy_pass {{ env.AUTH_REQUEST_OAUTH2PROXY_UPSTREAM }}$request_uri;
        internal;
        proxy_method GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Forwarded-Uri $request_uri;
      }
      location @oauth2_signin {
        internal;
        return 302 /oauth2/sign_in?rd=$scheme://$host$is_request_port$request_port$request_uri;
      }
    {% endif %}

    {% if npmplus_auth_request == "authelia" or create_authelia_locations %}
      location /internal/authelia/authz {
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        include proxy-headers.conf;
        proxy_set_header Accept-Encoding "";
        proxy_pass {{ env.AUTH_REQUEST_AUTHELIA_UPSTREAM }}/api/authz/auth-request;
        internal;
        proxy_method GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-URL $scheme://$host$is_request_port$request_port$request_uri;
      }
    {% endif %}

    {% if npmplus_auth_request == "authentik" or npmplus_auth_request == "authentik-send-basic-auth" or create_authentik_locations %}
      location /outpost.goauthentik.io {
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        include proxy-headers.conf;
        proxy_set_header Accept-Encoding "";
        proxy_pass {{ env.AUTH_REQUEST_AUTHENTIK_UPSTREAM }}/outpost.goauthentik.io;
        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;
        proxy_method GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URL $scheme://$host$is_request_port$request_port$request_uri;
      }
      location @goauthentik_proxy_signin {
        internal;
        add_header Set-Cookie $auth_cookie;
        return 302 /outpost.goauthentik.io/start?rd=$scheme://$host$is_request_port$request_port$request_uri;
      }
    {% endif %}

    # custom locations
    {{ locations }}

    {{ advanced_config }}

    # Custom
    include /data/custom_nginx/server_http.conf;
    include /data/custom_nginx/server_proxy.conf;
  }
{% endif %}
