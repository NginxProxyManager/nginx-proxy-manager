# ------------------------------------------------------------
# {{ .incoming_port }} TCP: {{ .tcp_forwarding }} UDP: {{ .udp_forwarding }}
# ------------------------------------------------------------

{{ if .enabled }}
{{ if .tcp_forwarding }}
server {
  listen {{ .incoming_port }} {{ if .certificate }} ssl {{ end }};
  {{ if not .ipv6 }}#{{ end }} listen [::]:{{ .incoming_port }} {{ if .certificate }} ssl {{ end }};

  {{ template "_certificates_stream.conf" . }}

  proxy_pass {{ .forwarding_host }}:{{ .forwarding_port }};

  access_log /data/logs/stream-{{ .id }}_access.log stream;
  error_log /data/logs/stream-{{ .id }}_error.log warn;

  # Custom
  include /data/nginx/custom/server_stream[.]conf;
  include /data/nginx/custom/server_stream_tcp[.]conf;
}
{{ end }}

{{ if .udp_forwarding }}
server {
  listen {{ .incoming_port }} udp;
  {{ if not .ipv6 }}#{{ end }} listen [::]:{{ .incoming_port }} udp;

  proxy_pass {{ .forwarding_host }}:{{ .forwarding_port }};

  access_log /data/logs/stream-{{ .id }}_access.log stream;
  error_log /data/logs/stream-{{ .id }}_error.log warn;

  # Custom
  include /data/nginx/custom/server_stream[.]conf;
  include /data/nginx/custom/server_stream_udp[.]conf;
}
{{ end }}
{{ end }}
