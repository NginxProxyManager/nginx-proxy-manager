{{ if gt .access_list_id 0 }}
    {{ if gt (len .access_list.items) 0 }}
    # Authorization
    auth_basic            "Authorization required";
    auth_basic_user_file  /data/access/{{ .access_list_id }};

    {{ if not .access_list.pass_auth }}
    proxy_set_header Authorization "";
    {{ end }}

    {{ end }}

    # Access Rules: {{ len .access_list.clients }} total
    {{ range $client := .access_list.clients }}
    {{ nginxAccessRule $client }}
    {{ end }}
    deny all;

    # Access checks must...
    {{ if .access_list.satisfy_any }}
    satisfy any;
    {{ else }}
    satisfy all;
    {{ end }}
{{ end }}
