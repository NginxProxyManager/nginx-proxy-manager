name: Docker image

on:
  push:
    branches:
      - develop
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:
    inputs:
      push:
        description: Push image to Docker Hub
        type: boolean
        default: true
      skip_frontend_tests:
        description: Skip frontend lint and vitest
        type: boolean
        default: false

concurrency:
  group: docker-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  IMAGE: docker.io/salexson/nginx-proxy-manager
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Host Podman via DOCKER_HOST; avoid Buildx spawning nested rootless containers in the runner.
  DOCKER_BUILDKIT: "0"
  BUILDAH_ISOLATION: chroot

jobs:
  build:
    # Infisical vault is internal; gen runners reach it and expose Docker via DOCKER_HOST.
    runs-on: [self-hosted, linux, gen]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Docker Hub credentials from Infisical (OIDC)
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.push)
        uses: ./.github/actions/infisical-oidc-load
        with:
          secret_path: /Docker
          recursive: "false"
          secret_keys: docker.io-user,docker.io-token

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Enable Yarn
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('frontend/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Verify Node.js version (> 20)
        run: |
          set -euo pipefail
          node --version
          major="$(node -p "Number(process.versions.node.split('.')[0])")"
          if [ "$major" -le 20 ]; then
            echo "::error::Node.js > 20 required (got $(node --version))"
            exit 1
          fi

      - name: Build frontend
        working-directory: frontend
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          CI: true
        run: |
          set -euo pipefail
          yarn install --immutable || yarn install
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            yarn lint
            yarn locale-compile
            yarn vitest run --no-color
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_frontend_tests }}" != "true" ]; then
            yarn lint
            yarn locale-compile
            yarn vitest run --no-color
          else
            yarn locale-compile
          fi
          yarn build

      - name: Set build metadata
        id: buildmeta
        run: |
          echo "date=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"
          echo "version=${{ github.ref_type == 'tag' && github.ref_name || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build image on host engine
        run: |
          set -euo pipefail
          echo "DOCKER_HOST=${DOCKER_HOST:-<default>}"
          docker version
          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && tag_args+=(-t "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"
          docker build \
            --pull \
            --security-opt label=disable \
            "${tag_args[@]}" \
            -f docker/Dockerfile \
            --build-arg TARGETPLATFORM=linux/amd64 \
            --build-arg BUILDPLATFORM=linux/amd64 \
            --build-arg BUILD_VERSION="${{ steps.buildmeta.outputs.version }}" \
            --build-arg BUILD_COMMIT="${{ github.sha }}" \
            --build-arg BUILD_DATE="${{ steps.buildmeta.outputs.date }}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            .
          docker images | grep nginx-proxy-manager || true

      - name: Log in to Docker Hub
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.push)
        run: |
          set -euo pipefail
          if [ -z "${DOCKER_IO_USER:-}" ] || [ -z "${DOCKER_IO_TOKEN:-}" ]; then
            echo "::error::DOCKER_IO_USER and DOCKER_IO_TOKEN must be set (Infisical /Docker)."
            exit 1
          fi
          printf '%s' "$DOCKER_IO_TOKEN" | docker login docker.io \
            --username "$DOCKER_IO_USER" \
            --password-stdin

      - name: Push image to Docker Hub
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.push)
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Logout from Docker Hub
        if: always()
        run: docker logout docker.io || true

      - name: Build summary
        if: always()
        run: |
          echo "## Image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ env.IMAGE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Platform: linux/amd64 via host docker/podman socket (no Buildx)._"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_PR builds are not pushed to Docker Hub._" >> "$GITHUB_STEP_SUMMARY"
          fi
