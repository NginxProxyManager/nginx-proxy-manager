{% if access_list_id > 0 %}
    set $auth_basic "Authorization required";
    {% if access_list.satisfy_any == 1 or access_list.satisfy_any == true %}
    # Satisfy Any - any check can succeed.
        {% if access_list.clients.size != 0 %}
    if ( $access_list_{{ access_list_id }} = 1) {
        set $auth_basic off;
    }
        {% endif %}
        {% if access_list.clientcas.size != 0 %}
    if ( $ssl_client_verify = "SUCCESS" ) {
        set $auth_basic off;
    }
        {% endif %}
    {% else %}
    # Satisfy All - all checks must succeed.
        {% if access_list.clients.size != 0 %}
    if ( $access_list_{{ access_list_id }} = 0) {
        return {% if drop_unauthorized == 1 or drop_unauthorized == true %}444{% else %}403{% endif %};
    }
        {% endif %}
        {% if access_list.clientcas.size != 0 %}
    if ( $ssl_client_verify != "SUCCESS" ) {
        return {% if drop_unauthorized == 1 or drop_unauthorized == true %}444{% else %}403{% endif %};
    }
        {% endif %}
    {% endif %}

    {% if access_list.items.length > 0 %}
    # Authorization
    auth_basic            $auth_basic;
    auth_basic_user_file  /data/access/{{ access_list_id }};
        {% if access_list.pass_auth == 0 or access_list.pass_auth == false %}
    proxy_set_header Authorization "";
        {% endif %}
    {% else %}
        {% if access_list.satisfy_any == 1 or access_list.satisfy_any == true %}
    if ( $auth_basic != "off" ) {
        return {% if drop_unauthorized == 1 or drop_unauthorized == true %}444{% else %}403{% endif %};
    }
        {% endif %}
    {% endif %}
{% endif %}
