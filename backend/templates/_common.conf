server_name {{ server_names | join: " " }};

listen unix:/run/nginx.sock;

{% if env.DISABLE_HTTP == "false" %}
  listen {{ env.IPV4_BINDING }}:{{ env.HTTP_PORT }}{% if env.LISTEN_PROXY_PROTOCOL_HTTP == "true" %} proxy_protocol{% endif %};
  {% if env.DISABLE_IPV6 == "false" %}listen {{ env.IPV6_BINDING }}:{{ env.HTTP_PORT }}{% if env.LISTEN_PROXY_PROTOCOL_HTTP == "true" %} proxy_protocol{% endif %};{% endif %}
{% endif %}

{% if certificate and certificate_id > 0 %}
  listen {{ env.IPV4_BINDING }}:{{ env.HTTPS_PORT }} ssl{% if env.LISTEN_PROXY_PROTOCOL_HTTPS == "true" %} proxy_protocol{% endif %};
  {% if env.DISABLE_IPV6 == "false" %}listen {{ env.IPV6_BINDING }}:{{ env.HTTPS_PORT }} ssl{% if env.LISTEN_PROXY_PROTOCOL_HTTPS == "true" %} proxy_protocol{% endif %};{% endif %}

  {% if env.DISABLE_H3_QUIC == "false" %}
    listen {{ env.IPV4_BINDING }}:{{ env.HTTPS_PORT }} quic;
    {% if env.DISABLE_IPV6 == "false" %}listen {{ env.IPV6_BINDING }}:{{ env.HTTPS_PORT }} quic;{% endif %}
    {% if npmplus_http3_support %}more_set_headers 'Alt-Svc: h3=":$alt_svc_port"; ma=86400';{% endif %}
  {% endif %}

  {% if certificate.provider == "letsencrypt" %}
    # Certbot TLS
    ssl_certificate /data/tls/certbot/live/npm-{{ certificate_id }}/fullchain.pem;
    ssl_certificate_key /data/tls/certbot/live/npm-{{ certificate_id }}/privkey.pem;
    {% if env.ACME_OCSP_STAPLING == "true" %}
      ssl_stapling on;
      ssl_stapling_verify on;
      ssl_stapling_file /data/tls/certbot/live/npm-{{ certificate_id }}.der;
      ssl_certificate_compression off;
    {% endif %}
  {% else %}
    # Custom TLS
    ssl_certificate /data/tls/custom/npm-{{ certificate_id }}/fullchain.pem;
    ssl_certificate_key /data/tls/custom/npm-{{ certificate_id }}/privkey.pem;
    {% if env.CUSTOM_OCSP_STAPLING == "true" %}
      ssl_stapling on;
      ssl_stapling_verify on;
      ssl_stapling_file /data/tls/custom/npm-{{ certificate_id }}.der;
      ssl_certificate_compression off;
    {% endif %}
  {% endif %}

  {% if meta and meta.mtls_certificate_id and meta.mtls_certificate_id > 0 %}
    ssl_verify_client on;
    ssl_client_certificate /data/tls/mtls/npm-{{ meta.mtls_certificate_id }}.pem;
  {% endif %}

  {% if ssl_forced %}
    if ($scheme = "http") {
      return 301 https://$host$is_request_port$request_port$request_uri;
    }
    if ($http_x_forwarded_proto = "http") {
      return 301 https://$host$is_request_port$request_port$request_uri;
    }
    {% if hsts_enabled %}
      {% if hsts_subdomains %}
        more_set_headers "Strict-Transport-Security: $hsts_includeSubDomains_header";
      {% else %}
        more_set_headers "Strict-Transport-Security: $hsts_header";
      {% endif %}
    {% endif %}
  {% endif %}
{% endif %}

location /.well-known/acme-challenge/ {
    root /data/tls/certbot/acme-challenge;
    fancyindex off;
    index off;
    allow all;
    auth_basic off;
    auth_request off;
}
