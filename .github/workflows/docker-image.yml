name: Docker image

on:
  push:
    branches:
      - develop
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:
    inputs:
      push:
        description: Push image to Docker Hub
        type: boolean
        default: true
      skip_frontend_tests:
        description: Skip frontend lint and vitest
        type: boolean
        default: false

concurrency:
  group: docker-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  IMAGE: docker.io/salexson/nginx-proxy-manager
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Internal Infisical + rootless Podman: use org gen runners (not ubuntu-latest).
    runs-on: [self-hosted, linux, gen]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load Docker Hub credentials from Infisical (OIDC)
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.push)
        uses: ./.github/actions/infisical-oidc-load
        with:
          secret_path: /Docker
          recursive: "false"
          secret_keys: docker.io-user,docker.io-token

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Build frontend
        working-directory: frontend
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          CI: true
        run: |
          set -euo pipefail
          corepack enable
          yarn install --immutable || yarn install
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            yarn lint
            yarn locale-compile
            yarn vitest run --no-color
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_frontend_tests }}" != "true" ]; then
            yarn lint
            yarn locale-compile
            yarn vitest run --no-color
          else
            yarn locale-compile
          fi
          yarn build

      - name: Set image tags
        id: tags
        run: |
          set -euo pipefail
          tags=()
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tags+=("${{ env.IMAGE }}:${GITHUB_REF#refs/tags/}")
          else
            tags+=("${{ env.IMAGE }}:${{ github.ref_name }}")
          fi
          tags+=("${{ env.IMAGE }}:sha-${GITHUB_SHA::7}")
          if [[ "${{ github.ref }}" == refs/heads/master ]]; then
            tags+=("${{ env.IMAGE }}:latest")
          fi
          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
            echo "tag_list=${tags[*]}"
          } >> "$GITHUB_OUTPUT"

      - name: Set build metadata
        id: buildmeta
        run: |
          echo "date=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"
          echo "version=${{ github.ref_type == 'tag' && github.ref_name || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build image with Podman
        env:
          BUILDAH_ISOLATION: chroot
        run: |
          set -euo pipefail
          podman_cmd=(podman)
          if [[ -n "${CONTAINER_HOST:-}" ]]; then
            podman_cmd=(podman --remote)
          fi
          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && tag_args+=(-t "$tag")
          done <<< "${{ steps.tags.outputs.tags }}"
          "${podman_cmd[@]}" build \
            --security-opt label=disable \
            "${tag_args[@]}" \
            -f docker/Dockerfile \
            --build-arg TARGETPLATFORM=linux/amd64 \
            --build-arg BUILDPLATFORM=linux/amd64 \
            --build-arg BUILD_VERSION="${{ steps.buildmeta.outputs.version }}" \
            --build-arg BUILD_COMMIT="${{ github.sha }}" \
            --build-arg BUILD_DATE="${{ steps.buildmeta.outputs.date }}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            .
          "${podman_cmd[@]}" images | grep nginx-proxy-manager || true

      - name: Log in to Docker Hub
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.push)
        run: |
          set -euo pipefail
          if [ -z "${DOCKER_IO_USER:-}" ] || [ -z "${DOCKER_IO_TOKEN:-}" ]; then
            echo "::error::DOCKER_IO_USER and DOCKER_IO_TOKEN must be set (Infisical /Docker)."
            exit 1
          fi
          podman_cmd=(podman)
          if [[ -n "${CONTAINER_HOST:-}" ]]; then
            podman_cmd=(podman --remote)
          fi
          printf '%s' "$DOCKER_IO_TOKEN" | "${podman_cmd[@]}" login docker.io \
            --username "$DOCKER_IO_USER" \
            --password-stdin

      - name: Push image to Docker Hub
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.push)
        run: |
          set -euo pipefail
          podman_cmd=(podman)
          if [[ -n "${CONTAINER_HOST:-}" ]]; then
            podman_cmd=(podman --remote)
          fi
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && "${podman_cmd[@]}" push "$tag"
          done <<< "${{ steps.tags.outputs.tags }}"

      - name: Logout from Docker Hub
        if: always()
        run: |
          podman_cmd=(podman)
          if [[ -n "${CONTAINER_HOST:-}" ]]; then
            podman_cmd=(podman --remote)
          fi
          "${podman_cmd[@]}" logout docker.io || true

      - name: Build summary
        if: always()
        run: |
          echo "## Image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ env.IMAGE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.tags.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Platform: linux/amd64 (self-hosted Podman)._"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_PR builds are not pushed to Docker Hub._" >> "$GITHUB_STEP_SUMMARY"
          fi
