# ----------------------------------------------------------------------
# Default Site
# DO NOT EDIT THIS FILE DIRECTLY, CHANGES WILL BE LOST WHEN UPDATING!
# ----------------------------------------------------------------------

server {
  listen unix:/run/nginx.sock;

  {% if env.DISABLE_HTTP == "false" %}
    listen {{ env.IPV4_BINDING }}:{{ env.HTTP_PORT }}{% if env.LISTEN_PROXY_PROTOCOL_HTTP == "true" %} proxy_protocol{% endif %};
    {% if env.DISABLE_IPV6 == "false" %}listen {{ env.IPV6_BINDING }}:{{ env.HTTP_PORT }}{% if env.LISTEN_PROXY_PROTOCOL_HTTP == "true" %} proxy_protocol{% endif %};{% endif %}
  {% endif %}

  listen {{ env.IPV4_BINDING }}:{{ env.HTTPS_PORT }} ssl{% if env.LISTEN_PROXY_PROTOCOL_HTTPS == "true" %} proxy_protocol{% endif %};
  {% if env.DISABLE_IPV6 == "false" %}listen {{ env.IPV6_BINDING }}:{{ env.HTTPS_PORT }} ssl{% if env.LISTEN_PROXY_PROTOCOL_HTTPS == "true" %} proxy_protocol{% endif %};{% endif %}

  {% if env.DISABLE_H3_QUIC == "false" and env.LISTEN_PROXY_PROTOCOL_HTTPS == "false" %}
    listen {{ env.IPV4_BINDING }}:{{ env.HTTPS_PORT }} quic;
    {% if env.DISABLE_IPV6 == "false" %}listen {{ env.IPV6_BINDING }}:{{ env.HTTPS_PORT }} quic;{% endif %}
    more_set_headers 'Alt-Svc: h3=":$alt_svc_port"; ma=86400';
  {% endif %}

  server_name "";
  ssl_reject_handshake on;
  return 444;
}

server {
  listen unix:/run/nginx.sock default_server;

  {% if env.DISABLE_HTTP == "false" %}
    listen {{ env.IPV4_BINDING }}:{{ env.HTTP_PORT }} bind reuseport deferred multipath so_keepalive=on default_server{% if env.LISTEN_PROXY_PROTOCOL_HTTP == "true" %} proxy_protocol{% endif %};
    {% if env.DISABLE_IPV6 == "false" %}listen {{ env.IPV6_BINDING }}:{{ env.HTTP_PORT }} bind reuseport deferred multipath so_keepalive=on default_server{% if env.LISTEN_PROXY_PROTOCOL_HTTP == "true" %} proxy_protocol{% endif %};{% endif %}
  {% endif %}

  listen {{ env.IPV4_BINDING }}:{{ env.HTTPS_PORT }} ssl bind reuseport deferred multipath so_keepalive=on default_server{% if env.LISTEN_PROXY_PROTOCOL_HTTPS == "true" %} proxy_protocol{% endif %};
  {% if env.DISABLE_IPV6 == "false" %}listen {{ env.IPV6_BINDING }}:{{ env.HTTPS_PORT }} ssl bind reuseport deferred multipath so_keepalive=on default_server{% if env.LISTEN_PROXY_PROTOCOL_HTTPS == "true" %} proxy_protocol{% endif %};{% endif %}

  {% if env.DISABLE_H3_QUIC == "false" %}
    listen {{ env.IPV4_BINDING }}:{{ env.HTTPS_PORT }} quic reuseport default_server;
    {% if env.DISABLE_IPV6 == "false" %}listen {{ env.IPV6_BINDING }}:{{ env.HTTPS_PORT }} quic reuseport default_server;{% endif %}
    more_set_headers 'Alt-Svc: h3=":$alt_svc_port"; ma=86400';
  {% endif %}

  server_name _;
  location /.well-known/acme-challenge/ {
    root /data/tls/certbot/acme-challenge;
  }

  {% if value == "444" %}
    ssl_reject_handshake on;
    location / { return 444; }
  {% else %}
    ssl_certificate ;
    ssl_certificate_key ;
    #ssl_stapling on;
    #ssl_stapling_verify on;
    #ssl_stapling_file ;
    #ssl_certificate_compression off;
    if ($scheme = "http") {
      return 301 https://$host$is_request_port$request_port$request_uri;
    }
    if ($http_x_forwarded_proto = "http") {
      return 301 https://$host$is_request_port$request_port$request_uri;
    }
  {% endif %}

  {% if value == "redirect" %}
    location / { return 302 {{ meta.redirect }}; }
  {% endif %}

  {% if value == "congratulations" %}
    location / {
      root /usr/local/nginx/html;
      try_files /default.html =404;
    }
  {% endif %}

  {% if value == "404" %}
    location / {
      return 404;
    }
    error_page 404 /dead.html;
    location = /dead.html {
      root /usr/local/nginx/html;
      internal;
    }
  {% endif %}

  {% if value == "html" %}
    location / {
      root /data/html;
      try_files $uri $uri/ /index.html;
    }
  {% endif %}
}
