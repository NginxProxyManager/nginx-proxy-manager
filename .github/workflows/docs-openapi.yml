name: Docs OpenAPI bundle

on:
  push:
    branches:
      - develop
      - master
    paths:
      - backend/schema/**
      - docs/scripts/generate-openapi.mjs
      - docs/src/public/openapi.json
      - VERSION
  pull_request:
    branches:
      - develop
      - master
    paths:
      - backend/schema/**
      - docs/scripts/generate-openapi.mjs
      - docs/src/public/openapi.json
      - VERSION

jobs:
  openapi-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Regenerate openapi.json
        run: node docs/scripts/generate-openapi.mjs

      - name: Verify committed bundle is up to date
        run: |
          set -euo pipefail
          git diff --exit-code docs/src/public/openapi.json
