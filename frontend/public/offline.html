<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#206bc4" />
		<title>Nginx Proxy Manager is offline</title>
		<style>
			:root { color-scheme: light dark; }
			body {
				align-items: center;
				background: #f6f8fb;
				color: #1f2937;
				display: flex;
				font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				justify-content: center;
				min-height: 100vh;
				margin: 0;
				padding: 1.5rem;
			}
			main {
				background: #fff;
				border: 1px solid #dce2ea;
				border-radius: 14px;
				box-shadow: 0 12px 32px rgb(0 0 0 / 8%);
				max-width: 28rem;
				padding: 2rem;
				text-align: center;
			}
			img { height: 4.5rem; margin-bottom: 1rem; }
			h1 { font-size: 1.4rem; margin: 0 0 .5rem; }
			p { color: #4b5563; line-height: 1.5; margin: 0 0 1.25rem; }
			button {
				background: #206bc4;
				border: 0;
				border-radius: 8px;
				color: #fff;
				cursor: pointer;
				font: inherit;
				font-weight: 600;
				padding: .65rem 1rem;
			}
			@media (prefers-color-scheme: dark) {
				body { background: #111827; color: #f9fafb; }
				main { background: #1f2937; border-color: #374151; }
				p { color: #d1d5db; }
			}
		</style>
	</head>
	<body>
		<main>
			<img src="/images/logo-no-text.svg" alt="" />
			<h1>Nginx Proxy Manager is offline</h1>
			<p>The app shell is installed, but management actions require a connection to the NPM server.</p>
			<button type="button" onclick="window.location.reload()">Try again</button>
		</main>
	</body>
</html>
