# --------------------------------------------------------------------------
# {{ incoming_port }} TCP: {{ tcp_forwarding }} UDP: {{ udp_forwarding }}
# DO NOT EDIT THIS FILE DIRECTLY, CHANGES WILL BE LOST WHEN UPDATING!
# --------------------------------------------------------------------------

{% if enabled %}

  upstream upstream_{{ id }} {
    zone upstream_{{ id }} 64k;
    server {{ forwarding_host }}{% if forwarding_port != "" %}:{{ forwarding_port }}{% endif %} resolve;
  }

  {% if tcp_forwarding %}
    server {
      listen {{ env.IPV4_BINDING }}:{{ incoming_port }}{% if certificate and certificate_id > 0 %} ssl{% endif %} reuseport deferred{% if env.ENABLE_MPTCP == "true" %} multipath{% endif %} so_keepalive=on;
      {% if env.DISABLE_IPV6 == "false" %}listen {{ env.IPV6_BINDING }}:{{ incoming_port }}{% if certificate and certificate_id > 0 %} ssl{% endif %} reuseport deferred{% if env.ENABLE_MPTCP == "true" %} multipath{% endif %} so_keepalive=on;{% endif %}

      {% if npmplus_proxy_protocol_forwarding %}proxy_protocol on;{% endif %}
      {% if npmplus_proxy_tls %}proxy_ssl on;{% endif %}


      {% if certificate and certificate_id > 0 %}
        {% if certificate.provider == "letsencrypt" %}
          # Certbot TLS
          ssl_certificate /data/tls/certbot/live/npm-{{ certificate_id }}/fullchain.pem;
          ssl_certificate_key /data/tls/certbot/live/npm-{{ certificate_id }}/privkey.pem;
          {% if env.ACME_OCSP_STAPLING == "true" %}
            ssl_stapling on;
            ssl_stapling_verify on;
            ssl_stapling_file /data/tls/certbot/live/npm-{{ certificate_id }}.der;
            ssl_certificate_compression off;
          {% endif %}
        {% else %}
          # Custom TLS
          ssl_certificate /data/tls/custom/npm-{{ certificate_id }}/fullchain.pem;
          ssl_certificate_key /data/tls/custom/npm-{{ certificate_id }}/privkey.pem;
          {% if env.CUSTOM_OCSP_STAPLING == "true" %}
            ssl_stapling on;
            ssl_stapling_verify on;
            ssl_stapling_file /data/tls/custom/npm-{{ certificate_id }}.der;
            ssl_certificate_compression off;
          {% endif %}
        {% endif %}

        {% if meta and meta.mtls_certificate_id and meta.mtls_certificate_id > 0 %}
          ssl_verify_client on;
          ssl_client_certificate /data/tls/mtls/npm-{{ meta.mtls_certificate_id }}.pem;
        {% endif %}
      {% endif %}

      proxy_pass upstream_{{ id }};

      {{ npmplus_advanced_config }}

      # Custom
      include /data/custom_nginx/server_stream.conf;
      include /data/custom_nginx/server_stream_tcp.conf;
    }
  {% endif %}

  {% if udp_forwarding %}
    server {
      listen {{ env.IPV4_BINDING }}:{{ incoming_port }} udp reuseport;
      {% if env.DISABLE_IPV6 == "false" %}listen {{ env.IPV6_BINDING }}:{{ incoming_port }} udp reuseport;{% endif %}

      proxy_pass upstream_{{ id }};

      {{ npmplus_advanced_config }}

      # Custom
      include /data/custom_nginx/server_stream.conf;
      include /data/custom_nginx/server_stream_udp.conf;
    }
  {% endif %}
{% endif %}
