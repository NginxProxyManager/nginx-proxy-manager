{{ template "_header_comment.conf" . }}

{{ if .enabled }}

{{ template "_hsts_map.conf" . }}

server {
  set $forward_scheme {{ .forward_scheme }};
  set $server         "{{ .forward_host }}";
  set $port           {{ .forward_port }};

{{ template "_listen.conf" . }}
{{ template "_certificates.conf" . }}
{{ template "_assets.conf" . }}
{{ template "_exploits.conf" . }}
{{ template "_hsts.conf" . }}
{{ template "_forced_ssl.conf" . }}

{{ if .allow_websocket_upgrade }}
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $http_connection;
proxy_http_version 1.1;
{{ end }}

  access_log /data/logs/proxy-host-{{ .id }}_access.log proxy;
  error_log /data/logs/proxy-host-{{ .id }}_error.log warn;

{{ .advanced_config }}

{{ .locations }}

{{ if .use_default_location }}

  location / {

{{ template "_access.conf" . }}
{{ template "_hsts.conf" . }}

    {{ if .allow_websocket_upgrade }}
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_http_version 1.1;
    {{ end }}

    # Proxy!
    include conf.d/include/proxy.conf;
  }
{{ end }}

  # Custom
  include /data/nginx/custom/server_proxy[.]conf;
}
{{ end }}
