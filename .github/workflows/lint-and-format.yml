name: lint-and-format
on:
  push:
    branches:
      - develop
  pull_request:
  workflow_dispatch:
jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/*
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: latest
      - name: install-sponge
        run: sudo apt-get install -y moreutils
      - name: biome-backend
        run: |
          cd backend
          pnpm install --frozen-lockfile
          pnpm biome lint --write
          pnpm biome format --write
      - name: biome-frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm biome lint --write
          pnpm biome format --write
          pnpm formatjs compile-folder src/locale/src src/locale/lang
          pnpm vitest
          ./src/locale/scripts/locale-sort.sh
      - name: nginxbeautifier
        run: |
          pnpm add -g nginxbeautifier
          nginxbeautifier -s 2 -r rootfs/usr/local/nginx/conf
      - name: push changes
        run: |
          git add -A
          git config user.name "GitHub"
          git config user.email "noreply@github.com"
          git commit -sm "update and lint" || true
          git push || true
