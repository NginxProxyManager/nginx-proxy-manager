{{ template "_header_comment.conf" . }}

{{ if .enabled }}

{{ template "_hsts_map.conf" . }}

server {
{{ template "_listen.conf" . }}
{{ template "_certificates.conf" . }}
{{ template "_hsts.conf" . }}
{{ template "_forced_ssl.conf" . }}

  access_log /data/logs/dead-host-{{ .id }}_access.log standard;
  error_log /data/logs/dead-host-{{ .id }}_error.log warn;

{{ .advanced_config }}

{{ if .use_default_location }}
  location / {
{{ template "_hsts.conf" . }}
    return 404;
  }
{{ end }}

  # Custom
  include /data/nginx/custom/server_dead[.]conf;
}
{{ end }}
